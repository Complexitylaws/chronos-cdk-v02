<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Chronos CDK - Minimal Client</title>
<style>
  body { background: #111; color: #ccc; font-family: monospace; padding: 20px; }
  canvas { border: 1px solid #333; display: block; margin: 20px auto; }
  #info { text-align: center; max-width: 600px; margin: 0 auto; }
  .npc { display: inline-block; margin: 4px; padding: 4px 8px; border-radius: 4px; font-size: 11px; }
</style>
</head>
<body>
<div id="info">
  <h2>Chronos CDK - Minimal Client</h2>
  <p>This is the simplest possible client. It polls the engine API and draws NPCs.</p>
  <p>Engine: <span id="status">connecting...</span></p>
  <div id="npcs"></div>
</div>
<canvas id="c" width="400" height="400"></canvas>
<script>
const API = 'http://localhost:5000';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLORS = { attack:'#f00', flee:'#08f', guard:'#0a0', orbit:'#a0f', scatter:'#fa0', curious:'#f0f', idle:'#555' };

async function poll() {
  try {
    const r = await fetch(API + '/api/game/state');
    const state = await r.json();
    document.getElementById('status').textContent = state.mood + ' (fitness: ' + state.fitness + ')';

    // Draw
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, 400, 400);

    // Draw NPCs
    let html = '';
    const entries = Object.entries(state.npcs || {});
    const count = entries.length;
    entries.forEach(([id, npc], i) => {
      const angle = (i / count) * Math.PI * 2 + Date.now() * 0.001;
      const r = 80 + (npc.intent === 'flee' ? 140 : npc.intent === 'attack' ? 30 : 100);
      const x = 200 + Math.cos(angle) * r;
      const y = 200 + Math.sin(angle) * r;

      ctx.beginPath();
      ctx.fillStyle = COLORS[npc.intent] || '#555';
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(id, x, y - 12);
      ctx.fillText(npc.intent, x, y + 16);

      const leader = npc.is_leader ? ' [L]' : '';
      html += '<span class="npc" style="background:' + COLORS[npc.intent] + '20;border:1px solid ' + COLORS[npc.intent] + '">' +
        id + ': ' + npc.intent + leader + '</span>';
    });

    // Player in center
    ctx.beginPath();
    ctx.fillStyle = '#fff';
    ctx.arc(200, 200, 10, 0, Math.PI * 2);
    ctx.fill();

    document.getElementById('npcs').innerHTML = html;
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}

setInterval(poll, 1000);
poll();
</script>
</body>
</html>
